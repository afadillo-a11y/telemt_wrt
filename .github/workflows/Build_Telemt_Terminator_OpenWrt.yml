name: Build Telemt Terminator (OpenWrt)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      PKG_NAME: telemt-terminator
      PKG_VERSION: ${{ github.event.inputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl tar gzip xz-utils
          NFPM_VER="2.45.2"
          curl -fsSL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VER}/nfpm_${NFPM_VER}_Linux_x86_64.tar.gz" | tar -xz
          sudo install -m 0755 nfpm /usr/local/bin/nfpm

      - name: Generate Package Content
        run: |
          set -euxo pipefail
          PKGROOT="${GITHUB_WORKSPACE}/pkgroot"
          mkdir -p "${PKGROOT}/usr/bin"

          cat > "${PKGROOT}/usr/bin/telemt-cleanup.sh" <<'CLEANUP'
          #!/bin/sh
          # Telemt Terminator — one-shot cleanup

          printf '[*] Telemt Terminator: stopping services...\n'
          [ -x /etc/init.d/telemt ] && /etc/init.d/telemt stop 2>/dev/null || true
          [ -x /etc/init.d/telemt-bot ] && /etc/init.d/telemt-bot stop 2>/dev/null || true

          printf '[*] Removing packages...\n'
          if command -v opkg >/dev/null 2>&1; then
            opkg remove luci-app-telemt telemt telemt_wrt telemt-bot \
              --autoremove --force-removal-of-dependent-packages 2>/dev/null || true
          elif command -v apk >/dev/null 2>&1; then
            apk del luci-app-telemt telemt telemt_wrt telemt-bot 2>/dev/null || true
          fi

          printf '[*] Killing remaining processes...\n'
          P="$(pidof telemt 2>/dev/null || true)"; [ -n "$P" ] && killall -9 telemt 2>/dev/null || true
          P="$(pidof telemt-bot 2>/dev/null || true)"; [ -n "$P" ] && killall -9 telemt-bot 2>/dev/null || true

          printf '[*] Purging files...\n'
          for f in \
            /etc/config/telemt \
            /etc/init.d/telemt \
            /etc/init.d/telemt-bot \
            /usr/bin/telemt \
            /usr/bin/telemt-bot \
            /usr/bin/telemt_bot.sh \
            /usr/lib/lua/luci/model/cbi/telemt.lua \
            /usr/lib/lua/luci/controller/telemt.lua \
            /usr/lib/lua/luci/view/telemt_status.htm \
            /usr/share/telemt-luci \
            /var/etc/telemt.toml \
            /var/etc/telemt_tlsfront \
            /var/etc/telemt \
            /var/run/telemt.manual_stop \
            /var/run/telemt.pid \
            /var/run/telemt-bot.pid \
            /var/log/telemt.log \
            /tmp/etc/telemt.toml \
            /tmp/etc/telemt.version \
            /tmp/etc/telemt.toml.new \
            /tmp/etc/telemt_core.old \
            /tmp/etc/telemt_core.new \
            /tmp/telemt_stats.txt \
            /tmp/telemt_bot_state \
            /tmp/telemt_health_state \
            /tmp/telemt_uci.lock \
            /tmp/telemt.toml \
            /etc/telemt; do
            [ -e "$f" ] && rm -rf "$f"
          done

          for f in /etc/uci-defaults/*telemt*; do
            [ -e "$f" ] && rm -f "$f"
          done

          rm -rf /tmp/luci-modulecache/* /tmp/luci-indexcache/* 2>/dev/null || true

          [ -x /etc/init.d/uhttpd ] && /etc/init.d/uhttpd restart 2>/dev/null || true
          [ -x /etc/init.d/rpcd ] && /etc/init.d/rpcd restart 2>/dev/null || true

          printf '[OK] Telemt removed. System clean.\n'
          CLEANUP

          chmod 0755 "${PKGROOT}/usr/bin/telemt-cleanup.sh"

      - name: Create nFPM configs and build IPK + APK
        run: |
          set -euxo pipefail
          mkdir -p packaging

          cat > packaging/postinst <<'POSTINST'
          #!/bin/sh
          [ -n "${IPKG_INSTROOT}" ] && exit 0

          /usr/bin/telemt-cleanup.sh || true
          rm -rf /tmp/luci-indexcache /tmp/luci-modulecache 2>/dev/null || true

          (
            sleep 10
            if command -v opkg >/dev/null 2>&1; then
              opkg remove telemt-terminator 2>/dev/null || true
            elif command -v apk >/dev/null 2>&1; then
              apk del telemt-terminator 2>/dev/null || true
            fi
          ) &

          exit 0
          POSTINST
          chmod 0755 packaging/postinst

          cat > packaging/prerm <<'PRERM'
          #!/bin/sh
          exit 0
          PRERM
          chmod 0755 packaging/prerm

          cat > nfpm_ipk.yaml <<EOF
          name: ${PKG_NAME}
          arch: all
          platform: linux
          version: ${PKG_VERSION}
          section: admin
          priority: optional
          maintainer: Arikusey
          description: "One-shot Telemt cleanup for OpenWrt 21-24. Removes services, packages, configs, zombie processes, LuCI artifacts, then self-removes."
          license: MIT

          depends:
            - opkg
            - procd
            - uci

          contents:
            - src: ./pkgroot/usr/bin/telemt-cleanup.sh
              dst: /usr/bin/telemt-cleanup.sh
              file_info:
                mode: 0755

          scripts:
            postinstall: ./packaging/postinst
            preremove: ./packaging/prerm
          EOF

          cat > nfpm_apk.yaml <<EOF
          name: ${PKG_NAME}
          arch: all
          platform: linux
          version: ${PKG_VERSION}
          section: admin
          priority: optional
          maintainer: Arikusey
          description: "One-shot Telemt cleanup for OpenWrt 25+. Removes services, packages, configs, zombie processes, LuCI artifacts, then self-removes."
          license: MIT

          depends:
            - procd
            - uci

          contents:
            - src: ./pkgroot/usr/bin/telemt-cleanup.sh
              dst: /usr/bin/telemt-cleanup.sh
              file_info:
                mode: 0755

          scripts:
            postinstall: ./packaging/postinst
            preremove: ./packaging/prerm
          EOF

          nfpm package --config nfpm_ipk.yaml --packager ipk --target "${PKG_NAME}_${PKG_VERSION}_all.ipk"
          nfpm package --config nfpm_apk.yaml --packager apk --target "${PKG_NAME}_${PKG_VERSION}_all.apk"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: telemt-terminator-${{ env.PKG_VERSION }}
          path: |
            *.ipk
            *.apk

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: telemt-terminator-${{ env.PKG_VERSION }}
          name: Telemt Terminator ${{ env.PKG_VERSION }}
          files: |
            *.ipk
            *.apk
          draft: false
          prerelease: false
